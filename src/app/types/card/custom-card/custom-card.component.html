<mat-card appearance="outlined" style="width: 100%;height: 100% !important;border: none;" [ngStyle]="field.props?.['style']">
   <mat-card-header>
     <mat-card-title  [innerHTML]="field.props?.['title'] || ''" style="line-height: normal;"></mat-card-title>
     <mat-card-subtitle style="color: rgb(247, 245, 242);">{{field.props?.['subtitle'] || ''}}</mat-card-subtitle>
   </mat-card-header>
   <mat-card-content>
      <div [innerHTML]="field.props?.['content'] || ''"></div>
    </mat-card-content>
    @if (field.props?.['actions']) {
      <mat-card-actions>
         <button mat-button>Learn More</button>
      </mat-card-actions>
    }
    @for (innerField of field.fieldGroup; track field) {
      <formly-field [field]="innerField"></formly-field>
    }
</mat-card>
